version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: wot_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: wot_db
      POSTGRES_USER: wot_user
      POSTGRES_PASSWORD: wot_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
    driver: local
