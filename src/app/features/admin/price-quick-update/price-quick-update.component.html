<div class="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300">

  <!-- Topbar -->
  <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40 transition-colors duration-300">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
      <a routerLink="/admin"
         class="p-2 text-gray-400 dark:text-gray-500 hover:text-brand-500 dark:hover:text-brand-300 hover:bg-brand-50 dark:hover:bg-brand-900/40 rounded-xl transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
      </a>
      <div class="flex items-center gap-2">
        <img src="/logo-wot-energy.png?v=2" alt="WOT Energy Logo" class="h-10 w-auto object-contain dark:brightness-0 dark:invert" />
        <span class="text-gray-800 dark:text-gray-100 font-semibold text-sm">
          Actualizar Precios
        </span>
      </div>
    </div>
  </header>

  <div class="max-w-2xl mx-auto px-4 py-8">

    <section class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm p-5 sm:p-6">
      <div class="mb-5">
        <h3 class="text-base font-semibold text-gray-800 dark:text-gray-100">Actualización rápida</h3>
        <p class="text-sm text-gray-400 dark:text-gray-500 mt-1">Busca por referencia exacta y actualiza el precio instantáneamente.</p>
      </div>

      <form (ngSubmit)="updatePrice()" class="grid grid-cols-1 gap-4">
        <div>
          <label for="quick-reference" class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1.5">Referencia del producto</label>
          <input
            id="quick-reference"
            type="text"
            [ngModel]="reference()"
            (ngModelChange)="reference.set($event)"
            name="reference"
            placeholder="Ej: REF-001"
            class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm bg-white dark:bg-gray-700 dark:text-gray-200 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition font-mono" />
        </div>

        <div>
          <label for="quick-price" class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1.5">Nuevo precio (COP)</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-sm font-medium">$</span>
            <input
              id="quick-price"
              type="number"
              min="0"
              step="1"
              [(ngModel)]="newPrice"
              name="newPrice"
              placeholder="0"
              class="w-full pl-7 pr-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl text-sm bg-white dark:bg-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition" />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="saving()"
          class="w-full bg-brand-500 hover:bg-brand-600 disabled:opacity-60 disabled:cursor-not-allowed text-white text-sm font-bold px-4 py-3 rounded-xl transition shadow-sm shadow-brand-200 mt-2 flex items-center justify-center gap-2">
          @if (saving()) {
            <svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Actualizando...
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 1.12-3 2.5S10.343 13 12 13s3 1.12 3 2.5S13.657 18 12 18m0-10V6m0 12v-2m9-4a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Actualizar precio
          }
        </button>
      </form>

      @if (successMessage()) {
        <div class="mt-4 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-700 dark:text-green-400 text-sm px-4 py-3 rounded-xl flex items-start gap-2 animate-fade-in">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <p>{{ successMessage() }}</p>
        </div>
      }

      @if (errorMessage()) {
        <div class="mt-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 text-sm px-4 py-3 rounded-xl flex items-start gap-2 animate-fade-in">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <p>{{ errorMessage() }}</p>
        </div>
      }
    </section>

  </div>
</div>
