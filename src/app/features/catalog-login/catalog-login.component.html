<!-- Full-screen premium welcome page -->
<div class="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 flex flex-col items-center justify-center px-4 relative overflow-hidden">

  <!-- Decorative background glow -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-brand-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-brand-700/10 rounded-full blur-2xl"></div>
  </div>

  <!-- Card principal -->
  <div class="relative w-full max-w-sm animate-fade-in">

    <!-- Logo + Brand -->
    <div class="flex flex-col items-center mb-8">
      <img src="/logo-wot-energy.png" alt="WOT Energy Logo" class="h-20 w-auto object-contain mb-5" />
      <h1 class="text-white text-2xl font-extrabold tracking-tight">WOT S.A.S.</h1>
      <p class="text-gray-400 text-sm mt-1 text-center">Catálogo exclusivo para clientes registrados</p>
    </div>

    <!-- Form card -->
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl shadow-black/50">
      <div class="mb-5">
        <h2 class="text-white font-bold text-lg">Acceso al catálogo</h2>
        <p class="text-gray-400 text-xs mt-0.5">Ingresa tu contraseña para ver los productos y precios.</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-4">

        <!-- Campo de contraseña -->
        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider">
            Contraseña de acceso
          </label>
          <div class="relative">
            <input
              id="catalog-password"
              [type]="showPass() ? 'text' : 'password'"
              [ngModel]="password()"
              (ngModelChange)="password.set($event); error.set('')"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              autofocus
              class="w-full bg-white/10 text-white placeholder-gray-500 border border-white/10 rounded-xl px-4 py-3 pr-11 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all"
              [class.border-red-500]="error()"
              [class.ring-2]="error()"
              [class.ring-red-500]="error()"
            />
            <!-- Toggle mostrar contraseña -->
            <button
              type="button"
              (click)="showPass.set(!showPass())"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-200 transition p-1"
              [title]="showPass() ? 'Ocultar' : 'Mostrar'">
              @if (showPass()) {
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Mensaje de error -->
        @if (error()) {
          <div [class.animate-shake]="shakeError()"
               class="flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-400 text-xs font-medium px-3 py-2.5 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            {{ error() }}
          </div>
        }

        <!-- Botón de acceso -->
        <button
          type="submit"
          id="catalog-login-submit"
          [disabled]="loading()"
          class="w-full bg-brand-500 hover:bg-brand-600 disabled:opacity-60 text-white font-bold py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-brand-500/25 active:scale-[0.98]">
          @if (loading()) {
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            Verificando...
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
            </svg>
            Ingresar al catálogo
          }
        </button>
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-gray-600 text-xs mt-6">
      © 2026 WOT S.A.S. · Solo para clientes autorizados
    </p>
  </div>
</div>
