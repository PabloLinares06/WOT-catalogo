<nav [class.navbar-scrolled]="scrolled()"
     class="bg-white/95 dark:bg-[#080D14]/95 backdrop-blur-sm
            border-b border-gray-100/80 dark:border-[#1A3050]/70
            sticky top-0 z-50 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="flex items-center justify-between h-24">

      <!-- Logo — negro en light, blanco en dark -->
      <a routerLink="/" class="flex items-center group shrink-0">
        <img
          src="/logo-wot-energy.png"
          alt="WOT Energy Logo"
          class="h-18 w-auto object-contain transition-all duration-300 group-hover:opacity-80 dark:brightness-0 dark:invert" />
      </a>

      <!-- Desktop nav links -->
      <div class="hidden md:flex items-center gap-1">
        <a routerLink="/"
           routerLinkActive="!text-brand-500 dark:!text-brand-400 bg-brand-50/80 dark:bg-brand-900/20 font-semibold"
           [routerLinkActiveOptions]="{exact: true}"
           class="px-4 py-2 rounded-xl text-gray-600 dark:text-gray-300
                  hover:text-brand-500 dark:hover:text-brand-400
                  hover:bg-brand-50 dark:hover:bg-brand-900/20
                  transition-all duration-200 text-sm font-medium">
          Catálogo
        </a>
      </div>

      <!-- Right side controls -->
      <div class="flex items-center gap-1 sm:gap-2">

        <!-- Dark mode toggle -->
        <button (click)="themeService.toggle()"
                id="theme-toggle-btn"
                class="p-2 rounded-xl text-gray-500 dark:text-gray-400
                       hover:text-brand-500 dark:hover:text-wot-yellow
                       hover:bg-brand-50 dark:hover:bg-[#1A3050]
                       transition-all duration-200"
                [title]="themeService.isDark() ? 'Modo claro' : 'Modo oscuro'">
          @if (themeService.isDark()) {
            <!-- Sol -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-wot-yellow" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
            </svg>
          } @else {
            <!-- Luna -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
          }
        </button>

        <!-- Cart button -->
        <a routerLink="/cart"
           id="cart-nav-btn"
           class="relative flex items-center gap-2 px-3 py-2 rounded-xl
                  text-gray-600 dark:text-gray-300
                  hover:text-brand-500 dark:hover:text-brand-400
                  hover:bg-brand-50 dark:hover:bg-[#1A3050]
                  transition-all duration-200 group">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 6h11L15 13M10 21a1 1 0 100-2 1 1 0 000 2zm6 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span class="hidden sm:block text-sm font-medium">Mi pedido</span>
          @if (cartService.itemCount() > 0) {
            <span class="absolute -top-1.5 -right-1.5
                         bg-wot-gradient text-white text-[10px] font-bold
                         min-w-[18px] h-[18px] px-1 rounded-full
                         flex items-center justify-center shadow-sm animate-pulse-scale">
              {{ cartService.itemCount() }}
            </span>
          }
        </a>

        <!-- Mobile menu button -->
        <button (click)="toggleMenu()"
                id="mobile-menu-btn"
                class="md:hidden p-2 text-gray-500 dark:text-gray-400
                       hover:text-brand-500 dark:hover:text-brand-400
                       hover:bg-brand-50 dark:hover:bg-[#1A3050]
                       rounded-xl transition-all duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            @if (menuOpen()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"/>
            }
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  @if (menuOpen()) {
    <div class="md:hidden border-t border-gray-100 dark:border-[#1A3050]
                bg-white dark:bg-[#0C1621]
                px-4 py-3 flex flex-col gap-1 animate-slide-up">
      <a routerLink="/" (click)="toggleMenu()"
         class="px-4 py-2.5 rounded-xl text-gray-700 dark:text-gray-300
                hover:bg-brand-50 dark:hover:bg-[#1A3050]
                hover:text-brand-500 dark:hover:text-brand-400
                transition text-sm font-medium flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Catálogo
      </a>
      <a routerLink="/cart" (click)="toggleMenu()"
         class="px-4 py-2.5 rounded-xl text-gray-700 dark:text-gray-300
                hover:bg-brand-50 dark:hover:bg-[#1A3050]
                hover:text-brand-500 dark:hover:text-brand-400
                transition text-sm font-medium flex items-center justify-between">
        <span class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 6h11L15 13M10 21a1 1 0 100-2 1 1 0 000 2zm6 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          Mi pedido
        </span>
        @if (cartService.itemCount() > 0) {
          <span class="bg-wot-gradient text-white text-xs font-bold px-2 py-0.5 rounded-full">
            {{ cartService.itemCount() }}
          </span>
        }
      </a>
      <div class="border-t border-gray-100 dark:border-[#1A3050] my-1"></div>
    </div>
  }
</nav>
